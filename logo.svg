<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140"
     role="img" aria-label="GG — Gustavo Giraldo, Analista de Datos">
  <defs>

    <!-- Degradado dorado principal -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#f2dc88"/>
      <stop offset="55%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#9e7830"/>
    </linearGradient>

    <!-- Degradado dorado vertical (para barras) -->
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f2dc88"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>

    <!-- Glow para el texto -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path para contener todo dentro del hexágono -->
    <clipPath id="hexClip">
      <polygon points="70,8 123.7,39 123.7,101 70,132 16.3,101 16.3,39"/>
    </clipPath>

    <!-- Patrón de puntos de datos (background) -->
    <pattern id="dotGrid" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="0.9" fill="#c9a84c" opacity="0.18"/>
    </pattern>

  </defs>

  <!-- ── BASE ── -->
  <polygon points="70,8 123.7,39 123.7,101 70,132 16.3,101 16.3,39"
           fill="#0a1628"/>

  <!-- ── GRID DE PUNTOS (data background) ── -->
  <polygon points="70,8 123.7,39 123.7,101 70,132 16.3,101 16.3,39"
           fill="url(#dotGrid)" clip-path="url(#hexClip)"/>

  <!-- ── HEXÁGONO INTERIOR SUTIL ── -->
  <polygon points="70,20 113,45 113,95 70,120 27,95 27,45"
           fill="none" stroke="#c9a84c" stroke-width="0.6" opacity="0.2"/>

  <!-- ── BORDE EXTERIOR DEGRADADO ── -->
  <polygon points="70,8 123.7,39 123.7,101 70,132 16.3,101 16.3,39"
           fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>

  <!-- ── NODOS EN VÉRTICES ── -->
  <circle cx="70"    cy="8"   r="3.2" fill="#c9a84c"/>
  <circle cx="123.7" cy="39"  r="3.2" fill="#c9a84c"/>
  <circle cx="123.7" cy="101" r="3.2" fill="#c9a84c"/>
  <circle cx="70"    cy="132" r="3.2" fill="#c9a84c"/>
  <circle cx="16.3"  cy="101" r="3.2" fill="#c9a84c"/>
  <circle cx="16.3"  cy="39"  r="3.2" fill="#c9a84c"/>

  <!-- ── MONOGRAMA GG ── -->
  <text x="70" y="80"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="56"
        letter-spacing="-4"
        fill="url(#goldGrad)"
        filter="url(#glow)">GG</text>

  <!-- ── LÍNEA DIVISORA ── -->
  <line x1="30" y1="88" x2="110" y2="88"
        stroke="#c9a84c" stroke-width="0.8" opacity="0.4"/>

  <!-- ── GRÁFICO DE BARRAS (data viz) ── -->
  <g clip-path="url(#hexClip)">
    <!-- Barra 1 — más baja -->
    <rect x="43" y="101" width="9" height="13" rx="1.5"
          fill="#c9a84c" opacity="0.45"/>
    <!-- Barra 2 -->
    <rect x="55" y="95"  width="9" height="19" rx="1.5"
          fill="#c9a84c" opacity="0.6"/>
    <!-- Barra 3 -->
    <rect x="67" y="99"  width="9" height="15" rx="1.5"
          fill="#c9a84c" opacity="0.55"/>
    <!-- Barra 4 — más alta -->
    <rect x="79" y="90"  width="9" height="24" rx="1.5"
          fill="url(#barGrad)" opacity="0.95"/>
    <!-- Barra 5 -->
    <rect x="91" y="93"  width="9" height="21" rx="1.5"
          fill="#c9a84c" opacity="0.75"/>
  </g>

  <!-- ── LÍNEA DE TENDENCIA sobre barras ── -->
  <polyline points="47.5,101 59.5,95 71.5,99 83.5,90 95.5,93"
            stroke="#f2dc88" stroke-width="1.1" fill="none"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Punto destacado en el pico -->
  <circle cx="83.5" cy="90" r="2.2" fill="#f2dc88" opacity="0.9"/>

</svg>
